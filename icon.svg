<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#g)"/>
  <!-- motion lines (the "flies") -->
  <g fill="#ffffff" opacity="0.55">
    <rect x="70"  y="196" width="120" height="20" rx="10"/>
    <rect x="50"  y="248" width="150" height="20" rx="10"/>
    <rect x="78"  y="300" width="110" height="20" rx="10"/>
  </g>
  <!-- dollar mark -->
  <text x="312" y="258" font-family="Arial, Helvetica, sans-serif" font-size="320" font-weight="800"
        fill="#ffffff" text-anchor="middle" dominant-baseline="central">$</text>
</svg>
