<script>
// ─── Data layer ───────────────────────────────────────────────────────────────
const STORAGE_KEY = 'budget_tracker_v1';

const DEFAULT_CATEGORIES = [
  { id: 'food',        name: 'Food & Dining',    color: '#f59e0b', icon: '🍔', budget: 500  },
  { id: 'transport',   name: 'Transport',         color: '#3b82f6', icon: '🚗', budget: 200  },
  { id: 'shopping',    name: 'Shopping',          color: '#ec4899', icon: '🛍️', budget: 300  },
  { id: 'health',      name: 'Health',            color: '#10b981', icon: '💊', budget: 150  },
  { id: 'entertainment', name: 'Entertainment',   color: '#8b5cf6', icon: '🎮', budget: 200  },
  { id: 'utilities',   name: 'Utilities',         color: '#06b6d4', icon: '⚡', budget: 250  },
  { id: 'rent',        name: 'Rent / Housing',    color: '#f97316', icon: '🏠', budget: 1500 },
  { id: 'savings',     name: 'Savings',           color: '#22c55e', icon: '💰', budget: 400  },
  { id: 'other',       name: 'Other',             color: '#94a3b8', icon: '📦', budget: 100  },
];

// Currency definitions and fallback exchange rates (per 1 USD), refreshed live on load.
const CURRENCIES = {
  CAD: { symbol: 'C$', name: 'Canadian Dollar' },
  USD: { symbol: 'US$', name: 'US Dollar' },
  EUR: { symbol: '€',  name: 'Euro' },
  GBP: { symbol: '£',  name: 'British Pound' },
  JPY: { symbol: '¥',  name: 'Japanese Yen' },
  AUD: { symbol: 'A$', name: 'Australian Dollar' },
  CHF: { symbol: 'Fr', name: 'Swiss Franc' },
  CNY: { symbol: '¥',  name: 'Chinese Yuan' },
  INR: { symbol: '₹',  name: 'Indian Rupee' },
  MXN: { symbol: 'Mex$', name: 'Mexican Peso' },
  BRL: { symbol: 'R$', name: 'Brazilian Real' },
};
const FALLBACK_RATES = { USD:1, EUR:0.92, GBP:0.79, JPY:157, CAD:1.36, AUD:1.52, CHF:0.88, CNY:7.24, INR:83.3, MXN:18.6, BRL:5.43 };

// Accent themes (per-user, saved to their account).
const ACCENT_PRESETS = [
  { id: 'indigo',  name: 'Indigo',   c1: '#6366f1', c2: '#8b5cf6' },
  { id: 'ocean',   name: 'Ocean',    c1: '#3b82f6', c2: '#06b6d4' },
  { id: 'emerald', name: 'Emerald',  c1: '#10b981', c2: '#22c55e' },
  { id: 'sunset',  name: 'Sunset',   c1: '#f59e0b', c2: '#f97316' },
  { id: 'rose',    name: 'Rose',     c1: '#f43f5e', c2: '#ec4899' },
  { id: 'grape',   name: 'Grape',    c1: '#a855f7', c2: '#d946ef' },
  { id: 'teal',    name: 'Teal',     c1: '#14b8a6', c2: '#0ea5e9' },
  { id: 'graphite',name: 'Graphite', c1: '#64748b', c2: '#94a3b8' },
];
function applyTheme() {
  const p = ACCENT_PRESETS.find(x => x.id === (data && data.accent)) || ACCENT_PRESETS[0];
  document.documentElement.style.setProperty('--accent', p.c1);
  document.documentElement.style.setProperty('--accent2', p.c2);
  const meta = document.querySelector('meta[name="theme-color"]'); if (meta) meta.setAttribute('content', '#0f172a');
}

// ─── Supabase (auth + cloud sync) ───────────────────────────────────────────
const SUPABASE_URL = 'https://fzcaajhlpvkpqrhfwwdd.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImZ6Y2FhamhscHZrcHFyaGZ3d2RkIiwicm9sZSI6ImFub24iLCJpYXQiOjE3ODA0NjAyOTcsImV4cCI6MjA5NjAzNjI5N30.Y_lDdhzC65w0xcCh15dRF-N1Ovxnv1vO7vfpqs-PzPw';
const ADMIN_EMAIL = 'shawndas21@gmail.com'; // only this account sees the Admin tab
let supa = null;          // supabase client
let currentUser = null;   // logged-in user (or null)
let cloudSaveTimer = null; // debounce handle for cloud writes
let authBusy = false;     // login in progress

function defaultData() {
  return { expenses: [], categories: DEFAULT_CATEGORIES, income: 3000, groups: [], cards: [], payrolls: [], oneTimeIncome: [], recurringExpenses: [],
           accent: 'indigo', baseCurrency: 'CAD', rates: { base: 'USD', table: { ...FALLBACK_RATES }, fetchedAt: null } };
}

// Apply forward-compatible migrations to a loaded data object (from cache or cloud).
function migrateData(parsed) {
  if (!parsed || typeof parsed !== 'object') return defaultData();
  if (!parsed.expenses) parsed.expenses = [];
  if (!parsed.categories) parsed.categories = DEFAULT_CATEGORIES;
  if (parsed.income == null) parsed.income = 3000;
  if (!parsed.groups) parsed.groups = [];
  if (!parsed.cards) parsed.cards = [];
  if (!parsed.payrolls) parsed.payrolls = [];
  if (!parsed.oneTimeIncome) parsed.oneTimeIncome = [];
  if (!parsed.recurringExpenses) parsed.recurringExpenses = [];
  if (!parsed.accent) parsed.accent = 'indigo';
  if (!parsed.baseCurrency) parsed.baseCurrency = 'CAD';
  if (!parsed.rates) parsed.rates = { base: 'USD', table: { ...FALLBACK_RATES }, fetchedAt: null };
  parsed.expenses.forEach(e => {
    if (e.currency == null) e.currency = parsed.baseCurrency || 'CAD';
    if (e.origAmount == null) e.origAmount = e.amount;
  });
  return parsed;
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) return migrateData(JSON.parse(raw));
  } catch(e) {}
  return defaultData();
}

function saveData(d) {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(d));
  saveToCloud(); // sync to the logged-in user's account (no-op if not signed in)
}

let data = loadData();
let activeTab = 'dashboard';
let activeMonth = new Date().toISOString().slice(0, 7); // YYYY-MM
let showExpenseModal = false;
let editingExpense = null;
let showCategoryModal = false;
let editingCategory = null;
let showGroupModal = false;
let editingGroup = null;
let showCardModal = false;
let editingCard = null;
let showPayrollModal = false;
let editingPayroll = null;
let showIncomeModal = false;
let editingIncome = null;
let showRecurringModal = false;
let editingRecurring = null;
let showCustomizeModal = false; // dashboard layout editor
let showThemeModal = false; // accent color picker
let showMenu = false; // "More" nav dropdown
let showAccountMenu = false; // header account/data dropdown
let adminData = null, adminLoading = false, adminError = null; // admin view cache
function emptyFilters() { return { search: '', categoryId: '', cardId: '', groupId: '', start: '', end: '', min: '', max: '' }; }
let expenseFilters = emptyFilters();
let filtersOpen = false; // advanced filter panel expanded
// Dashboard time-period filter (independent of the header month picker).
let dashPeriod = { mode: 'month', preset: 'thisMonth', month: new Date().toISOString().slice(0, 7), start: null, end: null };
let chartInstances = {};

// ─── Helpers ─────────────────────────────────────────────────────────────────
function uuid() { return crypto.randomUUID ? crypto.randomUUID() : Math.random().toString(36).slice(2); }

function formatCurrency(n, cur) {
  cur = cur || data.baseCurrency;
  const sym = (CURRENCIES[cur] || {}).symbol || cur + ' ';
  const dec = cur === 'JPY' ? 0 : 2;
  return sym + Math.abs(n).toLocaleString('en-US', { minimumFractionDigits: dec, maximumFractionDigits: dec });
}

// Convert an amount from `fromCur` into the current base currency using the cached rate table.
function toBase(amount, fromCur) {
  const base = data.baseCurrency;
  if (!fromCur || fromCur === base) return amount;
  const t = data.rates.table || FALLBACK_RATES;
  const rFrom = t[fromCur], rBase = t[base];
  if (!rFrom || !rBase) return amount; // unknown rate → assume already base
  // table is per-1-base-of-rates.base; convert via that pivot
  return amount * (rBase / rFrom);
}

// Fetch live rates (no API key needed) pivoted to USD, then re-render.
async function refreshRates() {
  try {
    const res = await fetch('https://api.frankfurter.app/latest?from=USD');
    if (!res.ok) throw new Error('rate fetch failed');
    const json = await res.json();
    const table = { USD: 1, ...json.rates };
    // keep only currencies we support, fall back for any missing
    const finalTable = {};
    Object.keys(CURRENCIES).forEach(c => { finalTable[c] = table[c] != null ? table[c] : FALLBACK_RATES[c]; });
    data.rates = { base: 'USD', table: finalTable, fetchedAt: new Date().toISOString() };
    saveData(data);
    if (currentUser) render();
  } catch (e) {
    // offline or blocked → silently keep fallback/cached rates
  }
}

// Value of an expense in the current base currency (recomputed live so changing base/rates is correct).
function expenseBase(e) {
  return toBase(e.origAmount != null ? e.origAmount : e.amount, e.currency || data.baseCurrency);
}

// Dashboard scope filter is disabled for now (classic dashboard).
function currentScope() { return null; }
function applyScope(list) {
  const s = currentScope();
  if (!s) return list;
  return list.filter(e =>
    (!s.groupId || e.groupId === s.groupId) &&
    (!s.cardId || e.cardId === s.cardId) &&
    (!s.categoryId || e.categoryId === s.categoryId));
}

function getMonthExpenses(month) {
  return applyScope(data.expenses.filter(e => e.date.startsWith(month)));
}

function getCategoryById(id) {
  return data.categories.find(c => c.id === id) || { name: 'Unknown', color: '#94a3b8', icon: '📦' };
}

function getGroupById(id) {
  return data.groups.find(g => g.id === id) || null;
}

function getGroupExpenses(groupId) {
  return data.expenses.filter(e => e.groupId === groupId);
}

function getGroupStats(groupId) {
  const exps = getGroupExpenses(groupId);
  const total = exps.reduce((s, e) => s + expenseBase(e), 0);
  const byCategory = {};
  exps.forEach(e => { byCategory[e.categoryId] = (byCategory[e.categoryId] || 0) + expenseBase(e); });
  const dates = exps.map(e => e.date).sort();
  return { total, byCategory, count: exps.length, first: dates[0], last: dates[dates.length - 1] };
}

// ─── Cards ─────────────────────────────────────────────────────────────────
function getCardById(id) { return data.cards.find(c => c.id === id) || null; }

function getCardStats(cardId, month) {
  const exps = data.expenses.filter(e => e.cardId === cardId && (!month || e.date.startsWith(month)));
  const total = exps.reduce((s, e) => s + expenseBase(e), 0);
  const byCategory = {};
  exps.forEach(e => { byCategory[e.categoryId] = (byCategory[e.categoryId] || 0) + expenseBase(e); });
  return { total, byCategory, count: exps.length };
}

// ─── Payroll ──────────────────────────────────────────────────────────────
// Normalize any pay frequency to a monthly-equivalent amount (in base currency).
function payrollMonthly(p) {
  const amt = toBase(p.amount, p.currency || data.baseCurrency);
  switch (p.frequency) {
    case 'weekly':      return amt * 52 / 12;
    case 'biweekly':    return amt * 26 / 12;
    case 'semimonthly': return amt * 2;
    case 'monthly':     return amt;
    default:            return amt;
  }
}

function totalMonthlyIncome() {
  if (data.payrolls.length === 0) return data.income; // fall back to manual income
  return data.payrolls.reduce((s, p) => s + payrollMonthly(p), 0);
}

// Generate pay dates for a payroll within [from, to] (inclusive), as YYYY-MM-DD strings.
function payDatesInRange(p, from, to) {
  const dates = [];
  let d = new Date(p.startDate + 'T12:00:00');
  const end = new Date(to + 'T12:00:00');
  const start = new Date(from + 'T12:00:00');
  // wind forward to at/after `from` without infinite loops
  let guard = 0;
  const step = (dt) => {
    if (p.frequency === 'weekly') dt.setDate(dt.getDate() + 7);
    else if (p.frequency === 'biweekly') dt.setDate(dt.getDate() + 14);
    else if (p.frequency === 'monthly') dt.setMonth(dt.getMonth() + 1);
    else if (p.frequency === 'yearly') dt.setFullYear(dt.getFullYear() + 1);
    else if (p.frequency === 'semimonthly') {
      // 1st and 15th-style: jump ~15 days alternating
      if (dt.getDate() < 15) dt.setDate(15); else { dt.setMonth(dt.getMonth() + 1); dt.setDate(1); }
    } else dt.setMonth(dt.getMonth() + 1);
  };
  while (d < start && guard++ < 2000) step(d);
  guard = 0;
  while (d <= end && guard++ < 2000) { dates.push(d.toISOString().slice(0,10)); step(d); }
  return dates;
}

// Materialize recurring expenses into real expense entries up to today (no duplicates).
function generateRecurringExpenses() {
  if (!Array.isArray(data.recurringExpenses) || data.recurringExpenses.length === 0) return false;
  const today = new Date().toISOString().slice(0, 10);
  let added = false;
  data.recurringExpenses.forEach(r => {
    if (r.active === false || !r.startDate) return;
    const seen = new Set(data.expenses.filter(e => e.recurringId === r.id).map(e => e.date));
    payDatesInRange(r, r.startDate, today).forEach(date => {
      if (seen.has(date)) return;
      data.expenses.push({
        id: uuid(), description: r.description, origAmount: r.amount,
        currency: r.currency || data.baseCurrency, amount: toBase(r.amount, r.currency || data.baseCurrency),
        date, categoryId: r.categoryId, cardId: r.cardId || null, groupId: r.groupId || null,
        note: r.note || '', recurringId: r.id, auto: true, createdAt: new Date().toISOString(),
      });
      added = true;
    });
  });
  if (added) saveData(data);
  return added;
}

function nextPayday() {
  const today = new Date().toISOString().slice(0,10);
  const future = new Date(); future.setDate(future.getDate() + 90);
  const horizon = future.toISOString().slice(0,10);
  let best = null;
  data.payrolls.forEach(p => {
    payDatesInRange(p, today, horizon).forEach(dt => {
      if (!best || dt < best.date) best = { date: dt, payroll: p };
    });
  });
  return best;
}

let _monthTotalsCache = {}; // cleared at the start of every render()
function getMonthTotals(month) {
  if (_monthTotalsCache[month]) return _monthTotalsCache[month];
  const exps = getMonthExpenses(month);
  const total = exps.reduce((s, e) => s + expenseBase(e), 0);
  const byCategory = {};
  data.categories.forEach(c => { byCategory[c.id] = 0; });
  exps.forEach(e => { byCategory[e.categoryId] = (byCategory[e.categoryId] || 0) + expenseBase(e); });
  const result = { total, byCategory };
  _monthTotalsCache[month] = result;
  return result;
}

// ─── Period filter (dashboard) ──────────────────────────────────────────────
function lastDayOfMonth(month) {
  const [y, mo] = month.split('-').map(Number);
  return `${month}-${String(new Date(y, mo, 0).getDate()).padStart(2, '0')}`;
}

// Resolve the active dashboard period into a concrete {start, end} (YYYY-MM-DD).
function periodRange() {
  const p = dashPeriod;
  if (p.mode === 'range' && p.start && p.end) {
    return p.start <= p.end ? { start: p.start, end: p.end } : { start: p.end, end: p.start };
  }
  return { start: p.month + '-01', end: lastDayOfMonth(p.month) };
}

function periodLabel() {
  const p = dashPeriod;
  if (p.mode === 'range' && p.start && p.end) {
    const f = d => new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: '2-digit' });
    const r = periodRange();
    return `${f(r.start)} – ${f(r.end)}`;
  }
  return monthLabel(p.month);
}

function expensesInRange(start, end) {
  return applyScope(data.expenses.filter(e => e.date >= start && e.date <= end));
}

function rangeTotals(start, end) {
  const exps = expensesInRange(start, end);
  const total = exps.reduce((s, e) => s + expenseBase(e), 0);
  const byCategory = {};
  data.categories.forEach(c => { byCategory[c.id] = 0; });
  exps.forEach(e => { byCategory[e.categoryId] = (byCategory[e.categoryId] || 0) + expenseBase(e); });
  return { total, byCategory, count: exps.length };
}

function rangeDays(start, end) {
  return Math.max(1, Math.round((new Date(end + 'T12:00:00') - new Date(start + 'T12:00:00')) / 86400000) + 1);
}

// Fraction of a month the period spans (used to prorate monthly budgets/income).
function periodMonthsFactor(start, end) {
  return rangeDays(start, end) / 30.4375;
}

// Money actually earned within [start, end]: count scheduled paydays × pay amount.
function earnedInRange(start, end) {
  let total = data.payrolls.length
    ? data.payrolls.reduce((s, p) => s + payDatesInRange(p, start, end).length * toBase(p.amount, p.currency || data.baseCurrency), 0)
    : totalMonthlyIncome() * periodMonthsFactor(start, end); // estimate from manual income
  // add one-time / non-recurring income received within the range
  total += oneTimeIncomeInRange(start, end);
  return total;
}

function oneTimeIncomeInRange(start, end) {
  return (data.oneTimeIncome || [])
    .filter(i => i.date >= start && i.date <= end)
    .reduce((s, i) => s + toBase(i.amount, i.currency || data.baseCurrency), 0);
}

function getLast6Months() {
  const months = [];
  for (let i = 5; i >= 0; i--) {
    const d = new Date();
    d.setDate(1);
    d.setMonth(d.getMonth() - i);
    months.push(d.toISOString().slice(0, 7));
  }
  return months;
}

function monthLabel(m) {
  const [y, mo] = m.split('-');
  return new Date(y, mo - 1, 1).toLocaleDateString('en-US', { month: 'short', year: '2-digit' });
}

// ─── Styled confirm dialog (replaces native confirm) ────────────────────────────
function showConfirm(message, opts = {}) {
  return new Promise(resolve => {
    const host = document.createElement('div');
    host.className = 'modal-bg fixed inset-0 z-[70] flex items-end sm:items-center justify-center p-0 sm:p-4';
    host.innerHTML = `
      <div class="card w-full sm:max-w-sm p-6 space-y-4 rounded-t-2xl sm:rounded-2xl">
        <p class="text-slate-200 text-sm leading-relaxed">${message}</p>
        <div class="flex gap-3">
          <button data-x class="flex-1 bg-slate-700 hover:bg-slate-600 text-white rounded-lg py-2.5 text-sm font-medium transition-colors">${opts.cancelText || 'Cancel'}</button>
          <button data-ok class="flex-1 ${opts.danger ? 'bg-red-500 hover:bg-red-600' : 'btn-primary'} text-white rounded-lg py-2.5 text-sm font-semibold transition-colors">${opts.confirmText || 'Confirm'}</button>
        </div>
      </div>`;
    const close = v => { host.remove(); resolve(v); };
    host.addEventListener('click', e => { if (e.target === host) close(false); });
    host.querySelector('[data-x]').onclick = () => close(false);
    host.querySelector('[data-ok]').onclick = () => close(true);
    document.body.appendChild(host);
    requestAnimationFrame(() => { const b = host.querySelector('[data-ok]'); if (b) b.focus(); });
  });
}

// ─── Haptics ──────────────────────────────────────────────────────────────────
function vibrate(ms) { try { if (navigator.vibrate) navigator.vibrate(ms); } catch (e) {} }

// ─── Toasts ───────────────────────────────────────────────────────────────────
function showToast(message, type = 'success') {
  vibrate(12);
  let host = document.getElementById('toastHost');
  if (!host) { host = document.createElement('div'); host.id = 'toastHost'; document.body.appendChild(host); }
  const t = document.createElement('div');
  t.className = 'toast ' + type;
  t.textContent = message;
  host.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 250); }, 1900);
}

// ─── Render ───────────────────────────────────────────────────────────────────
let _animate = false; // play entrance animations on this render (set on tab switch / boot)
function render() {
  _monthTotalsCache = {}; // fresh per render (data/currency may have changed)
  const app = document.getElementById('app');
  app.innerHTML = buildLayout();
  attachEvents();
  const doAnim = _animate;
  // Defer charts one frame so the UI paints instantly, then charts fill in.
  requestAnimationFrame(() => { renderCharts(); if (doAnim) animateCounters(); });
  _animate = false;
}

// Animate any <span class="countup" data-to data-kind> from 0 to its value.
function fmtKind(v, kind) {
  if (kind === 'pct') return v.toFixed(1) + '%';
  if (kind === 'num') return Math.round(v).toLocaleString('en-US');
  return formatCurrency(v);
}
function countUp(num, kind = 'cur') {
  return `<span class="countup" data-to="${num}" data-kind="${kind}">${fmtKind(Number(num) || 0, kind)}</span>`;
}
function animateCounters() {
  document.querySelectorAll('.countup').forEach(el => {
    const to = parseFloat(el.dataset.to); const kind = el.dataset.kind;
    if (!isFinite(to)) return;
    const dur = 650, t0 = performance.now();
    const tick = (t) => {
      const p = Math.min(1, (t - t0) / dur);
      const v = to * (1 - Math.pow(1 - p, 3));
      el.textContent = fmtKind(v, kind);
      if (p < 1) requestAnimationFrame(tick);
    };
    requestAnimationFrame(tick);
  });
}

// Compact, tidy dashboard toolbar: view selector + actions on one row, period filter below.
function scopeLabel(s) {
  if (!s) return '';
  const parts = [];
  if (s.groupId) { const g = getGroupById(s.groupId); if (g) parts.push(g.icon + ' ' + g.name); }
  if (s.cardId) { const c = getCardById(s.cardId); if (c) parts.push(c.icon + ' ' + c.name); }
  if (s.categoryId) { const c = getCategoryById(s.categoryId); parts.push(c.icon + ' ' + c.name); }
  return parts.join(' · ');
}

async function loadAdminData() {
  if (adminLoading || !supa) return;
  adminLoading = true; adminError = null;
  try {
    const { data: rows, error } = await supa.from('app_state').select('user_id, data, updated_at');
    if (error) throw error;
    adminData = rows || [];
  } catch (e) {
    adminError = (e && e.message) || 'Could not load (check the admin SQL policy in Supabase).';
    adminData = [];
  }
  adminLoading = false;
  if (activeTab === 'admin') render();
}
function refreshAdmin() { adminData = null; adminError = null; render(); }

  if (!isAdminUser()) return `<div class="card rounded-xl p-6 text-center text-slate-400">Access denied.</div>`;

function getFilteredExpenses() {
  const f = expenseFilters;
  return data.expenses.filter(e => {
    if (f.search) { const q = f.search.toLowerCase(); if (!(`${e.description} ${e.note || ''}`.toLowerCase().includes(q))) return false; }
    if (f.categoryId && e.categoryId !== f.categoryId) return false;
    if (f.cardId) { if (f.cardId === '__none__' ? e.cardId : e.cardId !== f.cardId) return false; }
    if (f.groupId) { if (f.groupId === '__none__' ? e.groupId : e.groupId !== f.groupId) return false; }
    if (f.start && e.date < f.start) return false;
    if (f.end && e.date > f.end) return false;
    const base = expenseBase(e);
    if (f.min !== '' && base < parseFloat(f.min)) return false;
    if (f.max !== '' && base > parseFloat(f.max)) return false;
    return true;
  });
}

function daysUntil(dateStr) {
  const today = new Date(); today.setHours(0,0,0,0);
  const d = new Date(dateStr + 'T00:00:00');
  const diff = Math.round((d - today) / 86400000);
  if (diff === 0) return 'Today';
  if (diff === 1) return 'Tomorrow';
  if (diff < 0) return Math.abs(diff) + ' days ago';
  return 'in ' + diff + ' days';
}

function freqLabel(f) {
  return { weekly:'Weekly', biweekly:'Bi-weekly (every 2 weeks)', semimonthly:'Semi-monthly (twice a month)', monthly:'Monthly', yearly:'Yearly' }[f] || f;
}

// Monthly-equivalent of a recurring expense (in base currency) — for the "fixed costs / month" total.
function recurringMonthly(r) {
  const amt = toBase(r.amount, r.currency || data.baseCurrency);
  switch (r.frequency) {
    case 'weekly':      return amt * 52 / 12;
    case 'biweekly':    return amt * 26 / 12;
    case 'semimonthly': return amt * 2;
    case 'monthly':     return amt;
    case 'yearly':      return amt / 12;
    default:            return amt;
  }
}

      </div>
    </div>

    <!-- Category budgets -->

      <div class="px-5 py-4 border-b border-slate-700 flex items-center justify-between">

      </div>

        ${data.categories.map(cat => {
          const spent = byCategory[cat.id] || 0;
          const pct = cat.budget > 0 ? Math.min(100, (spent / cat.budget) * 100) : 0;
          const remaining = cat.budget - spent;
          const over = spent > cat.budget;
          return `
          <div class="flex items-center gap-4 px-5 py-4 hover:bg-slate-700/20 transition-colors flex-wrap gap-y-2">
            <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0" style="background:${cat.color}22">${cat.icon}</div>
            <div class="flex-1 min-w-[160px]">

              <div class="flex items-center gap-2 mt-1">
                <div class="progress-bar h-1.5 flex-1"><div style="width:${pct}%;background:${over?'#ef4444':cat.color}" class="h-full rounded-full transition-all"></div></div>
                <span class="text-xs ${over?'text-red-400':'text-slate-400'} flex-shrink-0">${pct.toFixed(0)}%</span>

            </div>
            <div class="text-right text-sm flex-shrink-0">
              <p class="${over?'text-red-400':'text-slate-300'} font-medium">${formatCurrency(spent)} spent</p>
              <p class="text-slate-500">${over ? '⚠️ ' + formatCurrency(Math.abs(remaining)) + ' over' : formatCurrency(remaining) + ' left'}</p>
            </div>
            <div class="flex items-center gap-1 flex-shrink-0">
              <span class="text-slate-400">$</span>
              <input type="number" value="${cat.budget}" min="0" step="50"
                class="input-field rounded-lg px-2 py-1.5 w-28 text-right text-sm"
                onchange="updateCategoryBudget('${cat.id}', this.value)" />
              <button onclick="openCategoryModal('${cat.id}')" class="p-1.5 rounded-lg hover:bg-slate-600 text-slate-400 hover:text-white transition-colors text-sm">✏️</button>
              <button onclick="deleteCategory('${cat.id}')" class="p-1.5 rounded-lg hover:bg-red-500/20 text-slate-400 hover:text-red-400 transition-colors text-sm">🗑️</button>
            </div>
          </div>`;
        }).join('')}
      </div>
      <div class="px-5 py-3 border-t border-slate-700 flex justify-between items-center text-sm">
        <span class="text-slate-400">Total Budget</span>
        <span class="font-bold text-slate-200">${formatCurrency(data.categories.reduce((s,c)=>s+c.budget,0))}</span>
      </div>
    </div>

    <!-- Recurring expenses -->
    <div class="card rounded-xl p-5 flex items-center gap-4 flex-wrap">
      <span class="text-2xl">🔁</span>
      <div class="flex-1 min-w-[200px]">
        <p class="font-medium text-slate-200">Recurring Expenses</p>
        <p class="text-xs text-slate-400">Rent, subscriptions, monthly fees… auto-added as expenses on each due date.</p>
      </div>
      <button onclick="openRecurringModal()" class="btn-primary text-white rounded-lg px-4 py-2 text-sm font-medium">+ Add Recurring</button>
    </div>
    ${(() => {
      const list = (data.recurringExpenses || []).slice().sort((a,b) => recurringMonthly(b) - recurringMonthly(a));
      if (list.length === 0) return `<div class="card rounded-xl py-10 text-center text-slate-500 text-sm">No recurring expenses yet — add your rent, Netflix, gym, etc.</div>`;
      const monthlyTotal = list.filter(r => r.active !== false).reduce((s, r) => s + recurringMonthly(r), 0);
      return `
      <div class="card rounded-xl overflow-hidden">
        <div class="divide-y divide-slate-700/50">
          ${list.map(r => { const cat = getCategoryById(r.categoryId); const paused = r.active === false; return `
            <div class="flex items-center gap-4 px-5 py-3.5 hover:bg-slate-700/20 transition-colors ${paused?'opacity-50':''}">
              <div class="w-10 h-10 rounded-xl flex items-center justify-center text-xl flex-shrink-0" style="background:${cat.color}22">${cat.icon}</div>
              <div class="flex-1 min-w-0">
                <p class="font-medium text-slate-200 truncate">${escapeHtml(r.description)}${paused?' <span class="text-xs text-slate-500">(paused)</span>':''}</p>
                <p class="text-xs text-slate-500">${cat.name} · ${freqLabel(r.frequency).split(' (')[0]} · since ${new Date(r.startDate+'T12:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric',year:'2-digit'})}</p>
              </div>
              <div class="text-right flex-shrink-0">
                <p class="font-semibold text-red-400">${formatCurrency(toBase(r.amount, r.currency||data.baseCurrency))}</p>
                <p class="text-xs text-slate-500">${formatCurrency(recurringMonthly(r))}/mo</p>
              </div>
              <div class="flex gap-1 flex-shrink-0">
                <button onclick="toggleRecurring('${r.id}')" title="${paused?'Resume':'Pause'}" class="p-1.5 rounded-lg hover:bg-slate-600 text-slate-400 hover:text-white transition-colors text-sm">${paused?'▶️':'⏸️'}</button>
                <button onclick="openRecurringModal('${r.id}')" class="p-1.5 rounded-lg hover:bg-slate-600 text-slate-400 hover:text-white transition-colors text-sm">✏️</button>
                <button onclick="deleteRecurring('${r.id}')" class="p-1.5 rounded-lg hover:bg-red-500/20 text-slate-400 hover:text-red-400 transition-colors text-sm">🗑️</button>
              </div>
            </div>`; }).join('')}
        </div>
        <div class="px-5 py-3 border-t border-slate-700 flex justify-between items-center text-sm">
          <span class="text-slate-400">Fixed costs / month</span>
          <span class="font-bold text-red-400">${formatCurrency(monthlyTotal)}</span>
        </div>
      </div>`;
    })()}

    <!-- Danger zone -->
    <div class="card rounded-xl p-5 border border-red-500/30">
      <div class="flex items-center gap-4 flex-wrap">
        <span class="text-2xl">⚠️</span>
        <div class="flex-1 min-w-[200px]">
          <p class="font-medium text-red-300">Reset all data</p>
          <p class="text-xs text-slate-400">Erases every expense, card, trip, payroll, dashboard & setting on this device — back to a clean slate. Tip: hit ⬇️ Export first to keep a backup.</p>
        </div>
        <button onclick="resetAllData()" class="bg-red-500/20 hover:bg-red-500/40 text-red-300 hover:text-white rounded-lg px-4 py-2 text-sm font-medium transition-colors">Reset all data</button>
      </div>
    </div>
  </div>`;
}

// ─── Chart rendering ──────────────────────────────────────────────────────────
function renderCharts() {
  destroyCharts();
  if (activeTab === 'dashboard') { renderDashboardCharts(); renderAnalyticsCharts(); }
  if (activeTab === 'cards') renderCardChart();
}

function renderCardChart() {
  const ctx = document.getElementById('cardChart');
  if (!ctx || data.cards.length === 0) return;
  const labels = data.cards.map(c => `${c.icon} ${c.name}`);
  const totals = data.cards.map(c => getCardStats(c.id, activeMonth).total);
  const sym = (CURRENCIES[data.baseCurrency] || {}).symbol || '';
  // draw the $ amount at the end of each bar
  const valueLabels = {
    id: 'cardValueLabels',
    afterDatasetsDraw(chart) {
      const { ctx: cx } = chart;
      const meta = chart.getDatasetMeta(0);
      cx.save(); cx.fillStyle = '#e2e8f0'; cx.font = '600 12px Inter, sans-serif'; cx.textBaseline = 'middle';
      meta.data.forEach((bar, i) => { cx.fillText(formatCurrency(totals[i]), bar.x + 8, bar.y); });
      cx.restore();
    }
  };
  chartInstances.card = new Chart(ctx, {
    type: 'bar',
    data: { labels, datasets: [{ label: 'Spent', data: totals, backgroundColor: data.cards.map(c => c.color), borderRadius: 6, maxBarThickness: 38 }] },
    options: {
      responsive: true, maintainAspectRatio: true, indexAxis: 'y',
      layout: { padding: { right: 64 } },
      plugins: {
        legend: { display: false },
        tooltip: { backgroundColor: '#1e293b', borderColor: '#334155', borderWidth: 1, titleColor: '#f1f5f9', bodyColor: '#94a3b8', callbacks: { label: c => ' ' + formatCurrency(c.parsed.x) } }
      },
      scales: {
        x: { ticks: { color: '#64748b', callback: v => sym + v.toLocaleString() }, grid: { color: '#1e293b' } },
        y: { ticks: { color: '#cbd5e1', font: { size: 13 } }, grid: { display: false } }
      }
    },
    plugins: [valueLabels]
  });
}

function destroyCharts() {
  Object.values(chartInstances).forEach(c => c.destroy());
  chartInstances = {};
}

function renderDashboardCharts() {
  const months6 = getLast6Months();
  const spentSeries = months6.map(m => getMonthTotals(m).total);
  const earnedSeries = months6.map(m => earnedInRange(m + '-01', lastDayOfMonth(m)));

  const trendCtx = document.getElementById('trendChart');
  if (trendCtx) {
    chartInstances.trend = new Chart(trendCtx, {
      type: 'line',
      data: {
        labels: months6.map(monthLabel),
        datasets: [
          { label: 'Earned', data: earnedSeries, borderColor: '#22c55e', backgroundColor: 'rgba(34,197,94,0.08)', tension: 0.4, fill: true, pointBackgroundColor: '#22c55e', pointRadius: 4 },
          { label: 'Spent', data: spentSeries, borderColor: '#f59e0b', backgroundColor: 'rgba(245,158,11,0.08)', tension: 0.4, fill: true, pointBackgroundColor: '#f59e0b', pointRadius: 4 }
        ]
      },
      options: chartOpts()
    });
  }

  const { start, end } = periodRange();
  const { byCategory } = rangeTotals(start, end);
  const cats = data.categories.filter(c => (byCategory[c.id]||0) > 0);
  const donutCtx = document.getElementById('donutChart');
  if (donutCtx) {
    const donutTotal = cats.reduce((s, c) => s + (byCategory[c.id] || 0), 0);
    const centerText = {
      id: 'centerText',
      afterDraw(chart) {
        const { ctx, chartArea } = chart;
        if (!chartArea) return;
        const cx = (chartArea.left + chartArea.right) / 2;
        const cy = (chartArea.top + chartArea.bottom) / 2;
        ctx.save();
        ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
        ctx.fillStyle = '#f1f5f9';
        ctx.font = '700 18px Inter, sans-serif';
        ctx.fillText(formatCurrency(donutTotal), cx, cy - 6);
        ctx.fillStyle = '#64748b';
        ctx.font = '500 11px Inter, sans-serif';
        ctx.fillText('total', cx, cy + 13);
        ctx.restore();
      }
    };
    chartInstances.donut = new Chart(donutCtx, {
      type: 'doughnut',
      data: {
        labels: cats.map(c => c.name),
        datasets: [{ data: cats.map(c => byCategory[c.id]||0), backgroundColor: cats.map(c => c.color), borderWidth: 2, borderColor: '#1e293b' }]
      },
      options: { ...donutOpts(), plugins: { legend: { display: false } } },
      plugins: [centerText]
    });
    const legend = document.getElementById('donutLegend');
    if (legend) {
      const legendTotal = cats.reduce((s, c) => s + (byCategory[c.id] || 0), 0);
      legend.innerHTML = cats.map(c => {
        const amt = byCategory[c.id] || 0;
        const share = legendTotal > 0 ? (amt / legendTotal) * 100 : 0;
        return `
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-1.5"><div class="w-2.5 h-2.5 rounded-full flex-shrink-0" style="background:${c.color}"></div><span class="text-slate-300">${c.icon} ${c.name}</span></div>
          <span class="text-slate-400">${formatCurrency(amt)} <span class="text-slate-500">· ${share.toFixed(1)}%</span></span>
        </div>`;
      }).join('');
    }
  }
}

function renderAnalyticsCharts() {
  const months6 = getLast6Months().reverse();
  const barCtx = document.getElementById('barChart');
  if (barCtx) {
    const budgetLine = data.categories.reduce((s,c)=>s+c.budget,0);
    chartInstances.bar = new Chart(barCtx, {
      type: 'bar',
      data: {
        labels: months6.map(monthLabel),
        datasets: [
          { label: 'Spent', data: months6.map(m => getMonthTotals(m).total), backgroundColor: months6.map(m => getMonthTotals(m).total > budgetLine ? 'rgba(239,68,68,0.7)' : 'rgba(99,102,241,0.7)'), borderRadius: 6 },
          { label: 'Budget', data: months6.map(() => budgetLine), type: 'line', borderColor: '#f59e0b', borderDash: [5,5], tension: 0, pointRadius: 0, borderWidth: 2 }
        ]
      },
      options: chartOpts()
    });
  }
}

function chartOpts() {
  return {
    responsive: true, maintainAspectRatio: true,
    plugins: { legend: { labels: { color: '#94a3b8', font: { size: 12 } } }, tooltip: { backgroundColor: '#1e293b', borderColor: '#334155', borderWidth: 1, titleColor: '#f1f5f9', bodyColor: '#94a3b8', callbacks: { label: ctx => ' ' + formatCurrency(ctx.parsed.y||ctx.parsed) } } },
    scales: { x: { ticks: { color: '#64748b' }, grid: { color: '#1e293b' } }, y: { ticks: { color: '#64748b', callback: v => ((CURRENCIES[data.baseCurrency]||{}).symbol||'') + v.toLocaleString() }, grid: { color: '#334155' } } }
  };
}

function donutOpts() {
  return {
    responsive: true, maintainAspectRatio: false, cutout: '65%',
    plugins: { tooltip: { backgroundColor: '#1e293b', borderColor: '#334155', borderWidth: 1, titleColor: '#f1f5f9', bodyColor: '#94a3b8', callbacks: { label: ctx => ' ' + formatCurrency(ctx.parsed) } } }
  };
}

// ─── Event handlers ───────────────────────────────────────────────────────────
function attachEvents() {
  const mp = document.getElementById('monthPicker');
  if (mp) mp.addEventListener('change', e => { activeMonth = e.target.value; render(); });
}

const TAB_META = {
  help:     { icon: '📖', name: 'Guide' },
  dashboard:{ icon: '📊', name: 'Dashboard' },
  expenses: { icon: '📋', name: 'Expenses' },
  income:   { icon: '💵', name: 'Income' },
  budgets:  { icon: '🎯', name: 'Budgets' },
  trips:    { icon: '✈️', name: 'Trips' },
  cards:    { icon: '💳', name: 'Cards' },
  admin:    { icon: '🔐', name: 'Admin' },
};
function tabLabel(t) { const m = TAB_META[t]; return m ? `${m.icon} ${m.name}` : t; }
function tabIcon(t) { return (TAB_META[t] || {}).icon || '•'; }
function tabName(t) { return (TAB_META[t] || {}).name || t; }
function toggleMenu(event) { event.stopPropagation(); showMenu = !showMenu; render(); }
function closeMenu() { showMenu = false; render(); }
function toggleAccountMenu(event) { event.stopPropagation(); showAccountMenu = !showAccountMenu; render(); }
function closeAccountMenu() { showAccountMenu = false; render(); }

function switchTab(tab) { activeTab = tab; showMenu = false; _animate = true; vibrate(8); render(); }
function shiftMonth(delta) {
  const [y, m] = activeMonth.split('-').map(Number);
  const d = new Date(y, m - 1 + delta, 1);
  activeMonth = d.toISOString().slice(0, 7);
  render();
}

function setPreset(id) {
  const now = new Date();
  const ymd = d => d.toISOString().slice(0, 10);
  const ym = d => d.toISOString().slice(0, 7);
  if (id === 'thisMonth') {
    dashPeriod = { mode: 'month', preset: 'thisMonth', month: ym(now), start: null, end: null };
  } else if (id === 'lastMonth') {
    const d = new Date(now.getFullYear(), now.getMonth() - 1, 1);
    dashPeriod = { mode: 'month', preset: 'lastMonth', month: ym(d), start: null, end: null };
  } else if (id === 'last3') {
    const startD = new Date(now.getFullYear(), now.getMonth() - 2, 1);
    dashPeriod = { mode: 'range', preset: 'last3', month: ym(now), start: ymd(startD), end: ymd(now) };
  } else if (id === 'ytd') {
    dashPeriod = { mode: 'range', preset: 'ytd', month: ym(now), start: now.getFullYear() + '-01-01', end: ymd(now) };
  }
  persistActivePeriod();
  render();
}

function applyCustomRange() {
  const start = document.getElementById('rangeStart').value;
  const end = document.getElementById('rangeEnd').value;
  if (!start || !end) return;
  dashPeriod = { mode: 'range', preset: 'custom', month: dashPeriod.month, start, end };
  persistActivePeriod();
  render();
}

function persistActivePeriod() { const d = ensureDashboards(); d.period = { ...dashPeriod }; saveData(data); }

function switchDashboard(id) {
  ensureDashboards();
  data.activeDashboardId = id;
  const d = data.dashboards.find(x => x.id === id);
  if (d && d.period) dashPeriod = { ...d.period };
  saveData(data);
  render();
}

function createDashboard() {
  ensureDashboards();
  const d = { id: uuid(), name: 'Dashboard ' + (data.dashboards.length + 1), layout: defaultLayout(), period: { ...dashPeriod } };
  data.dashboards.push(d);
  data.activeDashboardId = d.id;
  saveData(data);
  showCustomizeModal = true; // open so they can rename / configure right away
  render();
}

function renameDashboard(val) {
  const d = ensureDashboards();
  d.name = (val || '').trim() || 'Untitled';
  saveData(data);
  render();
}

function setDashIcon(em) { const d = ensureDashboards(); d.icon = em; saveData(data); render(); }

function duplicateDashboard() {
  const src = ensureDashboards();
  const copy = JSON.parse(JSON.stringify(src));
  copy.id = uuid();
  copy.name = src.name + ' (copy)';
  data.dashboards.push(copy);
  data.activeDashboardId = copy.id;
  saveData(data);
  showToast('Dashboard duplicated ✓');
  render();
}

function setDashScope(field, val) {

// Drag-to-reorder dashboard sections (works with touch + mouse via pointer events).
function startWidgetDrag(e) {
  e.preventDefault();
  const list = document.getElementById('widgetSortList');
  const item = e.target.closest('[data-wid]');
  if (!list || !item) return;
  item.classList.add('dragging');
  const move = (ev) => {
    const y = ev.clientY;
    const others = Array.from(list.querySelectorAll('[data-wid]:not(.dragging)'));
    let before = null;
    for (const s of others) {
      const r = s.getBoundingClientRect();
      if (y < r.top + r.height / 2) { before = s; break; }
    }
    if (before) list.insertBefore(item, before); else list.appendChild(item);
  };
  const up = () => {
    item.classList.remove('dragging');
    document.removeEventListener('pointermove', move);
    document.removeEventListener('pointerup', up);
    const order = Array.from(list.querySelectorAll('[data-wid]')).map(el => el.getAttribute('data-wid'));
    reorderWidgets(order);
  };
  document.addEventListener('pointermove', move);
  document.addEventListener('pointerup', up);
}

function reorderWidgets(order) {
  const layout = getDashboardLayout();
  const map = {}; layout.forEach(w => { map[w.id] = w; });
  const newLayout = order.map(id => map[id]).filter(Boolean);
  layout.forEach(w => { if (!newLayout.find(x => x.id === w.id)) newLayout.push(w); }); // keep any not in DOM
  saveDashboardLayout(newLayout);
  render();
}
function resetDashboardLayout() {
  saveDashboardLayout(defaultLayout());
  render();
}

function exportData() {
  const payload = { app: 'Money Flies', version: 1, exportedAt: new Date().toISOString(), data };
  const blob = new Blob([JSON.stringify(payload, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url;
  a.download = 'money-flies-backup-' + new Date().toISOString().slice(0,10) + '.json';
  document.body.appendChild(a);
  a.click();
  a.remove();
  URL.revokeObjectURL(url);
}

function exportExcel() {
  if (!window.XLSX) { alert('Excel library not loaded yet — check your connection and try again.'); return; }
  const XLSX = window.XLSX;
  const base = data.baseCurrency;
  const r2 = n => Math.round((Number(n) || 0) * 100) / 100;

  const expRows = data.expenses.slice().sort((a, b) => a.date.localeCompare(b.date)).map(e => ({
    Date: e.date,
    Description: e.description,
    Category: (getCategoryById(e.categoryId) || {}).name || '',
    Card: e.cardId ? ((getCardById(e.cardId) || {}).name || '') : '',
    Trip: e.groupId ? ((getGroupById(e.groupId) || {}).name || '') : '',
    Currency: e.currency || base,
    'Original amount': r2(e.origAmount != null ? e.origAmount : e.amount),
    ['Amount (' + base + ')']: r2(expenseBase(e)),
    Recurring: e.recurringId ? 'Yes' : '',
    Note: e.note || '',
  }));
  const wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(expRows.length ? expRows : [{ Date: '', Description: 'No expenses yet' }]), 'Expenses');

  const incRows = (data.oneTimeIncome || []).slice().sort((a, b) => a.date.localeCompare(b.date)).map(i => ({
    Date: i.date, Source: i.source, Currency: i.currency || base,
    Amount: r2(i.amount), ['Amount (' + base + ')']: r2(toBase(i.amount, i.currency || base)), Note: i.note || '',
  }));
  if (incRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(incRows), 'Other income');

  const recRows = (data.recurringExpenses || []).map(rr => ({
    Description: rr.description, Category: (getCategoryById(rr.categoryId) || {}).name || '',
    Frequency: freqLabel(rr.frequency).split(' (')[0], Currency: rr.currency || base,
    Amount: r2(rr.amount), ['Per month (' + base + ')']: r2(recurringMonthly(rr)), Active: rr.active === false ? 'Paused' : 'Yes',
  }));
  if (recRows.length) XLSX.utils.book_append_sheet(wb, XLSX.utils.json_to_sheet(recRows), 'Recurring');

  XLSX.writeFile(wb, 'money-flies-' + new Date().toISOString().slice(0, 10) + '.xlsx');
  showToast('Excel exported ✓');
}

function importData(event) {
  const file = event.target.files && event.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async () => {
    try {
      const parsed = JSON.parse(reader.result);
      const incoming = parsed.data && parsed.data.expenses ? parsed.data : parsed; // accept wrapped or raw
      if (!incoming || !Array.isArray(incoming.expenses)) throw new Error('Not a valid Money Flies backup.');
      if (!(await showConfirm('This will REPLACE all current data with the contents of the backup file. Continue?', { danger: true, confirmText: 'Replace' }))) { event.target.value = ''; return; }
      data = incoming;
      // ensure required fields exist (reuse load-time defaults)
      if (!data.groups) data.groups = [];
      if (!data.cards) data.cards = [];
      if (!data.payrolls) data.payrolls = [];
      if (!data.baseCurrency) data.baseCurrency = 'CAD';
      if (!data.rates) data.rates = { base: 'USD', table: { ...FALLBACK_RATES }, fetchedAt: null };
      data.expenses.forEach(e => { if (e.currency == null) e.currency = data.baseCurrency; if (e.origAmount == null) e.origAmount = e.amount; });
      saveData(data);
      render();
      alert('Backup restored successfully ✅');
    } catch (err) {
      alert('Could not import this file: ' + err.message);
    }
    event.target.value = ''; // allow re-importing the same file
  };
  reader.readAsText(file);
}

          <label class="text-xs text-slate-400 uppercase tracking-wider">Email</label>
          <input id="authEmail" type="email" autocomplete="email" placeholder="you@example.com"
            class="input-field w-full rounded-lg px-3 py-2.5 mt-1" onkeydown="if(event.key==='Enter')doLogin()" />
        </div>
        <div>
          <label class="text-xs text-slate-400 uppercase tracking-wider">Password</label>
          <input id="authPass" type="password" autocomplete="current-password" placeholder="••••••••"
            class="input-field w-full rounded-lg px-3 py-2.5 mt-1" onkeydown="if(event.key==='Enter')doLogin()" />
        </div>
        <p id="authErr" class="text-xs text-red-400 min-h-[1rem]"></p>
        <button id="authBtn" onclick="doLogin()" class="btn-primary text-white w-full rounded-lg py-2.5 text-sm font-medium transition-all">Sign in</button>
      </div>
      <p class="text-xs text-slate-500 text-center">Accounts are invite-only. Ask the owner to create one for you.</p>
    </div>
  </div>`;
  const e = document.getElementById('authEmail'); if (e) e.focus();
}

async function doLogin() {
  if (authBusy) return;
  const emailEl = document.getElementById('authEmail'), passEl = document.getElementById('authPass'), errEl = document.getElementById('authErr'), btn = document.getElementById('authBtn');
  const email = emailEl.value.trim(), password = passEl.value;
  if (!email || !password) { errEl.textContent = 'Enter your email and password.'; return; }
  authBusy = true; btn.textContent = 'Signing in…'; errEl.textContent = '';
  try {
    const { data: res, error } = await supa.auth.signInWithPassword({ email, password });
    if (error) { errEl.textContent = error.message; return; }
    currentUser = res.user;
    await loadFromCloud();
    generateRecurringExpenses();
    applyActiveDashboardPeriod();
    applyTheme();
    _animate = true;
    renderRoot();
  } catch (err) {
    errEl.textContent = 'Could not sign in (network?). Try again.';
  } finally {
    authBusy = false;
    const b = document.getElementById('authBtn'); if (b) b.textContent = 'Sign in';
  }
}

async function logout() {
  if (!(await showConfirm('Sign out of Money Flies on this device?', { confirmText: 'Sign out' }))) return;
  try { await supa.auth.signOut(); } catch (e) {}
  currentUser = null;
  localStorage.removeItem(STORAGE_KEY); // clear cached data so the next user starts clean
  data = loadData();
  activeTab = 'dashboard';
  renderRoot();
}

// Pull the signed-in user's data from the cloud (or migrate local data on first login).
async function loadFromCloud() {
  try {
    const { data: row, error } = await supa.from('app_state').select('data').eq('user_id', currentUser.id).maybeSingle();
    if (error) throw error;
    if (row && row.data && Array.isArray(row.data.expenses)) {
      data = migrateData(row.data);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      return;
    }
    // No cloud row yet → first time for this account.
    const localHasData = data && Array.isArray(data.expenses) && data.expenses.length > 0;
    if (localHasData && confirm('Importer les données déjà présentes sur cet appareil dans ce compte ? (Annuler = repartir à zéro)')) {
      await saveToCloud(true); // push current local data up
    } else {
      data = defaultData();
      localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
      await saveToCloud(true);
    }
  } catch (e) {
    // Offline or error → fall back to the local cache so the app still works.
    data = loadData();
  }
}

// Save the current data blob to the cloud (debounced). No-op when signed out.
function saveToCloud(immediate) {
  if (!currentUser || !supa) return;
  if (currentUser.email) data.ownerEmail = currentUser.email; // so the admin view can identify users
  setSyncState('saving');
  const doSave = () => supa.from('app_state')
    .upsert({ user_id: currentUser.id, data, updated_at: new Date().toISOString() })
    .then(({ error }) => { setSyncState(error ? 'offline' : 'saved'); if (error) console.warn('cloud save failed', error.message); })
    .catch(() => setSyncState('offline'));
  clearTimeout(cloudSaveTimer);
  if (immediate) return doSave();
  cloudSaveTimer = setTimeout(doSave, 800);
}

// ─── Boot ─────────────────────────────────────────────────────────────────────
async function boot() {
  if (window.supabase && SUPABASE_URL.startsWith('http')) {
    supa = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    try {
      const { data: { session } } = await supa.auth.getSession();
      if (session && session.user) { currentUser = session.user; await loadFromCloud(); }
    } catch (e) {}
  } else {
    // Supabase unavailable (e.g. offline first load) → run local-only.
    currentUser = { id: 'local', local: true };
  }
  if (currentUser) generateRecurringExpenses(); // fill in due rent/subscriptions up to today
  applyActiveDashboardPeriod();
  applyTheme();
  _animate = true;
  renderRoot();
  refreshRates(); // fetch live FX rates in the background, then re-render
  setupPullToRefresh();
}
boot();

// ─── Pull-to-refresh (mobile) ──────────────────────────────────────────────────
function setupPullToRefresh() {
  let startY = null, pulling = 0, ptrEl = null;
  const showPtr = (txt) => {
    if (!ptrEl) { ptrEl = document.createElement('div'); ptrEl.id = 'ptr'; ptrEl.innerHTML = `<div class="pill"></div>`; document.body.appendChild(ptrEl); }
    ptrEl.querySelector('.pill').textContent = txt;
    ptrEl.style.opacity = '1';
  };
  const hidePtr = () => { if (ptrEl) ptrEl.style.opacity = '0'; };
  document.addEventListener('touchstart', (e) => {
    startY = (window.scrollY <= 0 && e.touches.length === 1) ? e.touches[0].clientY : null;
    pulling = 0;
  }, { passive: true });
  document.addEventListener('touchmove', (e) => {
    if (startY == null) return;
    pulling = e.touches[0].clientY - startY;
    if (pulling > 12) showPtr(pulling > 70 ? '↻ Release to refresh' : '↓ Pull to refresh');
    else hidePtr();
  }, { passive: true });
  document.addEventListener('touchend', async () => {
    if (startY == null) return;
    const trigger = pulling > 70;
    startY = null;
    if (trigger) {
      showPtr('↻ Refreshing…'); vibrate(15);
      try { if (currentUser && !currentUser.local && supa) await loadFromCloud(); } catch (e) {}
      await refreshRates();
      _animate = true; renderRoot();
      showToast('Refreshed ✓');
    }
    hidePtr();
  });
}

// Register service worker so the app works offline after first load (no-op on file://).
if ('serviceWorker' in navigator && location.protocol.startsWith('http')) {
  navigator.serviceWorker.register('sw.js').catch(() => {});
}
</script>
